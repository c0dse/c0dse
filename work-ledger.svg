  <text class="label mono" x="361" y="159" text-anchor="end">MIX</text>
  <text class="label mono" x="544" y="159" text-anchor="end">CHANGE</text>
  <circle class="green" cx="33" cy="183" r="4" />
  <text class="label mono" x="46" y="187">COMMITS</text>
  <text class="value green" x="303" y="187" text-anchor="end">225</text>
  <text class="body mono" x="361" y="187" text-anchor="end">50%</text>
  <text class="small mono" x="544" y="187" text-anchor="end">+201 VS PRIOR</text>
  <line class="divider" x1="28" y1="202" x2="544" y2="202" />
  <circle class="blue" cx="33" cy="223" r="4" />
  <text class="label mono" x="46" y="227">PRS OPENED</text>
  <text class="value blue" x="303" y="227" text-anchor="end">87</text>
  <text class="body mono" x="361" y="227" text-anchor="end">19%</text>
  <text class="small mono" x="544" y="227" text-anchor="end">+82 VS PRIOR</text>
  <line class="divider" x1="28" y1="242" x2="544" y2="242" />
  <circle class="orange" cx="33" cy="263" r="4" />
  <text class="label mono" x="46" y="267">ISSUES OPENED</text>
  <text class="value orange" x="303" y="267" text-anchor="end">142</text>
  <text class="body mono" x="361" y="267" text-anchor="end">31%</text>
  <text class="small mono" x="544" y="267" text-anchor="end">+142 VS PRIOR</text>
  <line class="divider" x1="28" y1="282" x2="544" y2="282" />
  <circle class="surface" cx="33" cy="303" r="4" />
  <text class="label mono" x="46" y="307">REVIEW CONTRIBUTIONS</text>
  <text class="value" x="303" y="307" text-anchor="end">0</text>
  <text class="body mono" x="361" y="307" text-anchor="end">0%</text>
  <text class="small mono" x="544" y="307" text-anchor="end">EVEN VS PRIOR</text>

  <line class="divider" x1="570" y1="96" x2="570" y2="331" />
  <text class="section-title mono" x="594" y="105">SHIPPING PULSE</text>
  <text class="small mono" x="832" y="105" text-anchor="end">COMPLETION + BREADTH</text>
  <line class="divider" x1="712" y1="122" x2="712" y2="321" />
  <line class="divider" x1="594" y1="220" x2="832" y2="220" />
  <text class="big-value green" x="594" y="157">66</text>
  <text class="label mono" x="594" y="178">MERGED PRS</text>
  <text class="small mono" x="594" y="207">+61 VS PRIOR</text>
  <text class="big-value blue" x="731" y="157">72</text>
  <text class="label mono" x="731" y="178">AUTHORED ISSUES</text>
  <text class="small mono" x="731" y="207">+72 VS PRIOR</text>
  <text class="big-value orange" x="594" y="267">10</text>
  <text class="label mono" x="594" y="288">REPOS WITH COMMITS</text>
  <text class="small mono" x="594" y="317">+8 VS PRIOR</text>
  <text class="big-value" x="731" y="267">44</text>
  <text class="label mono" x="731" y="288">ACTIVE DAYS</text>
  <text class="small mono" x="731" y="317">+34 VS PRIOR</text>
  <text class="small mono" x="731" y="190">CLOSED IN WINDOW</text>
  <text class="small mono" x="731" y="300">PUBLIC CALENDAR</text>

  <line class="divider" x1="1" y1="332" x2="859" y2="332" />
  <text class="small mono" x="28" y="354">AGGREGATED ACTIVITY / REPOSITORY NAMES AND WORK-ITEM DETAILS OMITTED</text>
  <text class="small mono" x="832" y="354" text-anchor="end">COUNTS FOLLOW GITHUB'S CONTRIBUTION DEFINITIONS</text>
</svg>

  <line class="divider" x1="1" y1="78" x2="859" y2="78" />

  <text class="section-title mono" x="28" y="107">CURRENT FOCUS</text>
  <text class="label mono" x="28" y="134">BUILDING</text>
  <text class="value" x="28" y="158">useful systems</text>
  <line class="divider" x1="28" y1="174" x2="402" y2="174" />
  <text class="label mono" x="28" y="195">WORKING ACROSS</text>
  <text class="value" x="28" y="219">backend / web / geospatial</text>
  <line class="divider" x1="28" y1="235" x2="402" y2="235" />

  <text class="value" x="28" y="280">Codex / Claude Code</text>

  <line class="divider" x1="430" y1="96" x2="430" y2="296" />
  <text class="section-title mono" x="458" y="107">TECH FOOTPRINT</text>
  <text class="label mono" x="458" y="144">BACKEND</text>
  <text class="value" x="832" y="144" text-anchor="end">Java / Spring</text>
  <line class="divider" x1="458" y1="159" x2="832" y2="159" />
  <text class="label mono" x="458" y="188">SPATIAL DATA</text>
  <text class="value" x="832" y="188" text-anchor="end">PostgreSQL / PostGIS</text>
  <line class="divider" x1="458" y1="203" x2="832" y2="203" />
  <text class="label mono" x="458" y="232">AUTOMATION</text>
  <text class="value" x="832" y="232" text-anchor="end">Python</text>
  <line class="divider" x1="458" y1="247" x2="832" y2="247" />
  <text class="label mono" x="458" y="276">AI WORKFLOW</text>
  <text class="value" x="832" y="276" text-anchor="end">Codex / Claude Code</text>

  <line class="divider" x1="1" y1="297" x2="859" y2="297" />
  <text class="small mono" x="28" y="317">FOCUS DESCRIBES THE WORK / TOOLS DESCRIBE THE APPROACH</text>
  <text class="small mono" x="832" y="317" text-anchor="end">EDITABLE IN PROFILE.JSON</text>
</svg>

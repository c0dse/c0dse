name: Update systems atlas

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: systems-atlas
  cancel-in-progress: true

jobs:
  update-atlas:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Fetch public contributions
        run: python scripts/fetch_contributions.py

      - name: Render systems atlas
        run: python scripts/render_systems_atlas_svg.py

      - name: Commit updated artwork
        shell: bash
        run: |
          if git diff --quiet -- data/contributions.json systems-atlas.svg; then
            echo "Systems Atlas is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json systems-atlas.svg
          git commit -m "chore: refresh systems atlas [skip ci]"
          git push
